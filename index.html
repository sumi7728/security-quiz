<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>資安互動式刷題系統</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\(', '\)']], displayMath: [['$$','$$']] },
      svg: { fontCache: 'global' },
      startup: { typeset: false }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <script defer src="questions.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">Information Security Quiz</p>
        <h1>資安互動式刷題系統</h1>
        <p class="sub">763 題題庫，支援練習、考試、錯題本、分類與關鍵字搜尋。數學式會用 MathJax 顯示。</p>
      </div>
      <div class="heroStats">
        <div class="stat"><span>完整題庫</span><b id="statAll">0</b><small>PDF 可解析題目</small></div>
        <div class="stat"><span>去除完全重複</span><b id="statUnique">0</b><small>內容完全相同才刪</small></div>
        <div class="stat"><span>錯題本</span><b id="wrongCount">0</b><small>保存在此瀏覽器</small></div>
      </div>
    </section>

    <section id="setup" class="card setupGrid">
      <div class="controls">
        <label>題庫模式
          <select id="bankMode">
            <option value="all">完整 763 題</option>
            <option value="unique">去除完全重複</option>
            <option value="wrong">只刷錯題本</option>
          </select>
        </label>
        <label>分類
          <select id="tagFilter"><option value="all">全部分類</option></select>
        </label>
        <label>題數
          <select id="count">
            <option>10</option><option selected>20</option><option>30</option><option>50</option><option>100</option><option value="all">全部</option>
          </select>
        </label>
        <label>模式
          <select id="quizMode">
            <option value="practice">練習模式：答完立刻看答案</option>
            <option value="exam">考試模式：最後看結果</option>
          </select>
        </label>
        <div class="rangeBox">
          <label>原題號起<input id="startNo" inputmode="numeric" placeholder="例如 1"></label>
          <label>原題號迄<input id="endNo" inputmode="numeric" placeholder="例如 400"></label>
        </div>
        <button id="startBtn" class="primary">開始刷題</button>
        <button id="wrongBtn" class="ghost">錯題重練</button>
        <button id="clearWrongBtn" class="ghost danger">清空錯題本</button>
      </div>

      <div class="searchPanel">
        <h2>快速查題</h2>
        <div class="searchRow">
          <input id="searchInput" placeholder="搜尋 AES、CIA、SSL、RSA、mod..." />
          <button id="searchBtn">搜尋</button>
        </div>
        <div id="searchResult" class="searchResult"><p class="muted">輸入關鍵字後可以快速查題。</p></div>
      </div>
    </section>

    <section id="quiz" class="card quizCard" hidden>
      <div class="quizTop">
        <span id="qIndex" class="pill">第 1 題</span>
        <span id="scoreBadge" class="pill light">目前 0 / 0</span>
      </div>
      <div class="barWrap"><div id="bar" class="bar"></div></div>
      <p id="meta" class="meta"></p>
      <h2 id="question" class="question"></h2>
      <div id="options" class="options"></div>
      <div id="feedback" class="feedback" hidden></div>
      <div class="actions">
        <button id="prevBtn" class="ghost">上一題</button>
        <button id="nextBtn" class="primary">下一題</button>
        <button id="finishBtn" class="ghost">交卷 / 看結果</button>
        <button id="backBtn" class="ghost">回設定</button>
      </div>
    </section>

    <section id="result" class="card resultCard" hidden>
      <h2>結果</h2>
      <p id="summary" class="summary"></p>
      <div class="actions">
        <button id="againBtn" class="primary">用同設定再刷一次</button>
        <button id="homeBtn" class="ghost">回設定</button>
      </div>
      <h3>錯題回顧</h3>
      <div id="review"></div>
    </section>
  </main>
</body>
</html>
