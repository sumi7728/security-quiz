<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">Information Security Quiz</p>
        <h1>資安互動式刷題系統</h1>
        <p class="sub">763 題題庫已直接寫死在 HTML 裡，支援練習、考試、錯題本、分類與關鍵字搜尋。數學式會用 MathJax 顯示。</p>
      </div>
      <div class="heroStats">
        <div class="stat"><span>完整題庫</span><b id="statAll">0</b><small>PDF 可解析題目</small></div>
        <div class="stat"><span>去除完全重複</span><b id="statUnique">0</b><small>內容完全相同才刪</small></div>
        <div class="stat"><span>錯題本</span><b id="wrongCount">0</b><small>保存在此瀏覽器</small></div>
      </div>
    </section>

    <section id="setup" class="card setupGrid">
      <div class="controls">
        <label>題庫模式
          <select id="bankMode">
            <option value="all">完整 763 題</option>
            <option value="unique">去除完全重複</option>
            <option value="wrong">只刷錯題本</option>
          </select>
        </label>
        <label>分類
          <select id="tagFilter"><option value="all">全部分類</option></select>
        </label>
        <label>題數
          <select id="count">
            <option>10</option><option selected>20</option><option>30</option><option>50</option><option>100</option><option value="all">全部</option>
          </select>
        </label>
        <label>模式
          <select id="quizMode">
            <option value="practice">練習模式：答完立刻看答案</option>
            <option value="exam">考試模式：最後看結果</option>
          </select>
        </label>
        <div class="rangeBox">
          <label>原題號起<input id="startNo" inputmode="numeric" placeholder="例如 1"></label>
          <label>原題號迄<input id="endNo" inputmode="numeric" placeholder="例如 400"></label>
        </div>
        <button id="startBtn" class="primary">開始刷題</button>
        <button id="wrongBtn" class="ghost">錯題重練</button>
        <button id="clearWrongBtn" class="ghost danger">清空錯題本</button>
      </div>

      <div class="searchPanel">
        <h2>快速查題</h2>
        <div class="searchRow">
          <input id="searchInput" placeholder="搜尋 AES、CIA、SSL、RSA、mod..." />
          <button id="searchBtn">搜尋</button>
        </div>
        <div id="searchResult" class="searchResult"><p class="muted">輸入關鍵字後可以快速查題。</p></div>
      </div>
    </section>

    <section id="quiz" class="card quizCard" hidden>
      <div class="quizTop">
        <span id="qIndex" class="pill">第 1 題</span>
        <span id="scoreBadge" class="pill light">目前 0 / 0</span>
      </div>
      <div class="barWrap"><div id="bar" class="bar"></div></div>
      <p id="meta" class="meta"></p>
      <h2 id="question" class="question"></h2>
      <div id="options" class="options"></div>
      <div id="feedback" class="feedback" hidden></div>
      <div class="actions">
        <button id="prevBtn" class="ghost">上一題</button>
        <button id="nextBtn" class="primary">下一題</button>
        <button id="finishBtn" class="ghost">交卷 / 看結果</button>
        <button id="backBtn" class="ghost">回設定</button>
      </div>
    </section>

    <section id="result" class="card resultCard" hidden>
      <h2>結果</h2>
      <p id="summary" class="summary"></p>
      <div class="actions">
        <button id="againBtn" class="primary">用同設定再刷一次</button>
        <button id="homeBtn" class="ghost">回設定</button>
      </div>
      <h3>錯題回顧</h3>
      <div id="review"></div>
    </section>
  </main>

除剛部署的方案","B":"向供應商要求退款","C":"確認方案是否如預期運作，且未對現有環境造成負面影響","D":"責備執行不力的 員工"},"tags":["其他"]},{"seq":316,"source_id":316,"answer":"D","question":"一份好的稽核報告，應該具備什麼特性？","options":{"A":"充滿艱澀的技術術語， 讓管理層看不懂","B":"篇幅越長越好","C":"只報告好的結果，隱藏發現的缺失","D":"清楚呈現稽核發現 (Findings)、風險等級、以及具體的改善建議"},"tags":["其他"]},{"seq":317,"source_id":317,"answer":"B","question":"當一個資安事件發生並處理完畢後，進行「事後檢討 (Lessons Learned)」的主要目的是什麼？","options":{"A":"向媒體發布新聞稿","B":"分析事件根本原因， 並改善現有的防禦措施與應變計畫","C":"找出應該被開除的員工","D":"計算事件造 成的財務損失"},"tags":["法規/事件"]},{"seq":318,"source_id":318,"answer":"C","question":"在稽核過程中，以下哪種行為屬於「實體安全 (Physical Security)」的稽 核範圍？","options":{"A":"檢查防火牆的設定規則","B":"審查員工的密碼強度政策","C":"檢視伺 服器機房的出入管制紀錄","D":"掃描系統的弱點"},"tags":["資安基礎","網路安全"]},{"seq":319,"source_id":319,"answer":"B","question":"在實施系統安全強化 (System Hardening) 時，以下哪個做法是不恰當 的？","options":{"A":"移除不必要的軟體與服務","B":"保持系統預設的帳號密碼以方便管理","C":"定期安裝最新的安全性更新 (Patches)","D":"關閉不需要的連接埠 (ports)"},"tags":["資安基礎"]},{"seq":320,"source_id":320,"answer":"C","question":"制定資安目標時，應該遵循 SMART 原則，請問 SMART 中的「M」 代表什麼？","options":{"A":"巨大 (Massive)","B":"金錢 (Money)","C":"可衡量 (Measurable)","D":"管理 (Management)"},"tags":["其他"]},{"seq":321,"source_id":321,"answer":"C","question":"稽核工作完成後，最重要的下一步是什麼？","options":{"A":"將報告鎖在保險箱","B":"舉行慶功宴","C":"追蹤稽核缺失的改善進度，並進行複查","D":"立即解散稽核團隊"},"tags":["其他"]},{"seq":322,"source_id":322,"answer":"C","question":"以下何者不是撰寫資安維護計畫時需要考量的核心要素？","options":{"A":"維持系統 的可用性 (Availability)","B":"確保資料的完整性 (Integrity)","C":"提升公司產品的市場 佔有率 (Market Share)","D":"保護資料的機密性 (Confidentiality)"},"tags":["資安基礎"]},{"seq":323,"source_id":323,"answer":"C","question":"在進行資產盤點時，除了硬體設備，還應該包含以下哪些項目？","options":{"A":"辦 公室傢俱","B":"公司建築物","C":"軟體、資料、服務及人員","D":"公司股價"},"tags":["其他"]},{"seq":324,"source_id":324,"answer":"B","question":"資安計畫中的「權責劃分」主要目的為何？","options":{"A":"購買資安保險","B":"確保 在資安事件發生時，能明確知道由誰負責應對與處理","C":"限制員工的網路存取 權限","D":"增加計畫的複雜度"},"tags":["法規/事件","網路安全"]},{"seq":325,"source_id":325,"answer":"C","question":"在實施資料備份策略時，'3-2-1 原則' 中的 '1' 代表什麼？","options":{"A":"只能由 一位管理員操作備份","B":"只需要保留一份備份","C":"至少要有一份備份存放在異 地 (Off-site)","D":"每天至少備份一次"},"tags":["其他"]},{"seq":326,"source_id":326,"answer":"A","question":"以下何者是衡量資安防護成效的關鍵績效指標 (KPI) 的一個好例子？","options":{"A":"平均威脅偵測時間 (Mean Time to Detect, MTTD)","B":"公司網站的訪客數量","C":"CEO 的滿意度分數","D":"IT 部門購買了多少新設備"},"tags":["其他"]},{"seq":327,"source_id":327,"answer":"B","question":"計畫中包含「變更管理 (Change Management)」程序的目的是什麼？","options":{"A":"阻止任何系統的變更","B":"確保所有對系統的變更都經過審核、測試與記錄，以 降低風險","C":"讓員工可以隨意安裝軟體","D":"增加 IT 部門的工作量"},"tags":["其他"]},{"seq":328,"source_id":328,"answer":"C","question":"稽核人員要求檢視「防火牆規則變更紀錄」，這是為了驗證哪個控制 措施的有效性？","options":{"A":"員工資安意識訓練","B":"實體安全管制","C":"變更管理程序","D":"災難復原計畫"},"tags":["網路安全"]},{"seq":329,"source_id":329,"answer":"D","question":"內部稽核 (Internal Audit) 和外部稽核 (External Audit) 最大的不同點在 於？","options":{"A":"外部稽核的成本較低","B":"內部稽核比較不專業","C":"內部稽核不需要產 出報告","D":"稽核人員的獨立性與隸屬組織不同"},"tags":["其他"]},{"seq":330,"source_id":330,"answer":"A","question":"資安政策 (Policy) 與資安程序 (Procedure) 的主要區別是什麼？","options":{"A":"政 策提供高階的指導方針與原則，程序則提供詳細的執行步驟","B":"政策是技術性 的，程序是管理性的","C":"政策由 IT 部門制定，程序由高階主管制定","D":"兩者 沒有實質區別"},"tags":["其他"]},{"seq":331,"source_id":331,"answer":"B","question":"進行資安稽核的主要目的是什麼？","options":{"A":"癱瘓公司的正常營運","B":"獨立且 客觀地評估資安管控措施的有效性，並確保其符合政策與法規","C":"找出並懲處 犯錯的員工","D":"證明公司的系統是絕對安全的"},"tags":["其他"]},{"seq":332,"source_id":332,"answer":"C","question":"部署入侵偵測系統 (IDS) 的主要作用是什麼？","options":{"A":"加密所有網路傳輸 的資料","B":"主動阻擋所有可疑的網路流量","C":"監控網路或系統活動，並在發現 可疑行為時發出警報","D":"取代防火牆的功能"},"tags":["網路安全"]},{"seq":333,"source_id":333,"answer":"C","question":"在資安領域中，PDCA 循環代表什麼？","options":{"A":"密碼-裝置-雲端-存取 (Password-Device-Cloud-Access)","B":"政策-文件-控制-稽核 (Policy-Document-Control- Audit)","C":"計畫-執行-檢查-行動 (Plan-Do-Check-Act)","D":"保護-偵測-加密-授權 (Protect-Detect-Encrypt-Authorize)"},"tags":["資安基礎"]},{"seq":334,"source_id":334,"answer":"C","question":"滲透測試 (Penetration Testing) 在資安稽核中扮演什麼角色？","options":{"A":"一種員 工的社交工程測驗","B":"一種被動的日誌分析工具","C":"模擬駭客的攻擊手法，主 動找出系統可被利用的弱點","D":"一種資料備份的驗證方式"},"tags":["資安基礎"]},{"seq":335,"source_id":335,"answer":"B","question":"在實施資安維護計畫時，最重要且最基礎的防護措施之一是什麼？","options":{"A":"要求所有員工使用強密碼並定期更換","B":"以上皆是","C":"定期進行資料備份","D":"部署防火牆與防毒軟體"},"tags":["資安基礎","網路安全"]},{"seq":336,"source_id":336,"answer":"A","question":"何者是實施身分與存取管理 (IAM) 的核心功能？","options":{"A":"確保只有被授權 的人員，在適當的時間，能存取適當的資源","B":"設計公司的官方網站","C":"監控 員工的網頁瀏覽紀錄","D":"提供免費的 Wi-Fi 服務"},"tags":["其他"]},{"seq":337,"source_id":337,"answer":"D","question":"在資安維護計畫中，「可接受使用政策 (AUP)」主要是規範誰的行 為？","options":{"A":"外部的攻擊者","B":"僅限 IT 管理人員","C":"僅限高階主管","D":"組織的所有 使用者 (包含員工、約聘人員等)"},"tags":["其他"]},{"seq":338,"source_id":338,"answer":"D","question":"在精進資安計畫時，若發現某項控制措施的成本遠高於其所保護資產 的價值，組織應該如何考量？","options":{"A":"堅持執行，不計成本","B":"立即放棄所有資安 防護","C":"隱瞞此項發現","D":"考慮接受該風險 (Risk Acceptance)，或尋找更具成本 效益的替代方案"},"tags":["其他"]},{"seq":339,"source_id":339,"answer":"D","question":"在進行法規遵循性稽核 (Compliance Audit) 時，稽核的依據是什麼？","options":{"A":"公司內部的 IT 標準","B":"競爭對手的資安政策","C":"最新的科技新聞","D":"外部 的法律、法規或行業標準 (如：GDPR ISO 27001)"},"tags":["ISO/ISMS"]},{"seq":340,"source_id":340,"answer":"A","question":"為何將「使用者回饋」納入資安計畫的精進流程中是重要的？","options":{"A":"因 為可以了解現行政策或工具是否影響日常工作效率，從而進行優化，提高遵循 度","B":"因為使用者不重要","C":"因為可以增加資安團隊的工作量","D":"因為法規強 制要求"},"tags":["其他"]},{"seq":341,"source_id":341,"answer":"C","question":"實施員工資安意識訓練的主要目的是什麼？","options":{"A":"懲罰點擊釣魚郵件的員 工","B":"篩選出不適任的員工","C":"讓員工成為組織資安防護的第一道防線","D":"滿 足法規要求而已"},"tags":["資安基礎"]},{"seq":342,"source_id":342,"answer":"B","question":"以下何者是定義「資料分類 (Data Classification)」的主要目的？","options":{"A":"讓 所有資料都公開透明","B":"根據資料的敏感性與價值，給予不同層級的保護","C":"增加資料儲存的困難度","D":"方便刪除不重要的資料"},"tags":["其他"]},{"seq":343,"source_id":343,"answer":"B","question":"根據 ISO 27001 標準的精神，持續改善 (Continual Improvement) 是資訊 安全管理系統 (ISMS) 的核心要求之一。這主要體現在哪個管理環節？","options":{"A":"在 採購新設備時","B":"贯穿於整個 PDCA 循環中","C":"僅在計畫制定階段","D":"僅在稽 核階段"},"tags":["ISO/ISMS"]},{"seq":344,"source_id":344,"answer":"A","question":"在 ISO 27001:2022 中，如何管理資訊安全的獨立審查？","options":{"A":"應按規劃 的間隔時間或發生重大變更時進行獨立審查","B":"僅在問題發生後才進行審查","C":"不需要進行獨立審查","D":"獨立審查可以隨意進行"},"tags":["ISO/ISMS"]},{"seq":345,"source_id":345,"answer":"A","question":"ISO 27001:2022 中，對於資訊安全的角色與職責有何要求？","options":{"A":"應根據 組織的需要，定義和分配資訊安全角色與職責","B":"角色與職責僅需在問題發生 時才考慮","C":"角色與職責可以隨意分配","D":"不需要明確定義角色與職責"},"tags":["ISO/ISMS"]},{"seq":346,"source_id":346,"answer":"B","question":"ISO/IEC 27001:2022 在變更規劃方面新增了哪些要求？","options":{"A":"變更不需要 任何計劃","B":"變更應以規劃之方式執行","C":"變更可以隨意執行","D":"變更應在發 生後再進行規劃"},"tags":["ISO/ISMS"]},{"seq":347,"source_id":347,"answer":"A","question":"ISO 27001:2022 中，對於資訊安全的法律、法令、法規及契約要求有何 要求？","options":{"A":"應被識別、文件化並保持更新","B":"不需要文件化","C":"可以隨意識別 和更新","D":"僅在法律變更時才需要更新"},"tags":["ISO/ISMS"]},{"seq":348,"source_id":348,"answer":"D","question":"ISO 27001:2022 中，對於資訊安全事件的管理有何新要求？","options":{"A":"不需要 定義角色和職責","B":"事故管理過程不需要文件化","C":"僅需在事故發生後進行管 理","D":"應定義、建立並溝通資訊安全事故管理過程"},"tags":["ISO/ISMS"]},{"seq":349,"source_id":349,"answer":"A","question":"ISO/IEC 27001:2022 在附錄 A 中，對於活動監測有何新增要求？","options":{"A":"應 監測網路、系統和應用程式的異常行為","B":"活動監測不需要任何行動","C":"活動 監測不需要考慮安全性","D":"活動監測可以隨意"},"tags":["ISO/ISMS","網路安全"]},{"seq":350,"source_id":350,"answer":"A","question":"ISO/IEC 27001:2022 在附錄 A 中，對於安全編碼有何新增要求？","options":{"A":"軟 體開發應採用安全編碼原則","B":"安全編碼不需要考慮安全性","C":"安全編碼可以 隨意","D":"安全編碼不需要任何原則"},"tags":["ISO/ISMS"]},{"seq":351,"source_id":351,"answer":"A","question":"ISO/IEC 27001:2022 在內部稽核和管理審查方面有何變更？","options":{"A":"新增輸 入事項：與資訊安全管理相關的關注方的需求和期望的變化","B":"內部稽核和管 理審查的架構變更","C":"管理審查不需要考慮任何變化","D":"內部稽核不再需要任 何輸入事項"},"tags":["ISO/ISMS"]},{"seq":352,"source_id":352,"answer":"D","question":"ISO/IEC 27001:2022 在附錄 A 中，對於驗證資訊有何要求？","options":{"A":"驗證資 訊不需要考慮安全性","B":"驗證資訊可以隨意","C":"驗證資訊不需要任何管理","D":"鑑別資訊的分配和管理應由一個管理過程來管控"},"tags":["ISO/ISMS"]},{"seq":353,"source_id":353,"answer":"A","question":"ISO 27001:2022 中，對於資訊刪除有何新要求？","options":{"A":"當不再需要時，應 刪除儲存於資訊系統、裝置或任何其它儲存媒體中的資訊","B":"僅在法律要求時 才刪除資訊","C":"資訊刪除不需要任何程序","D":"資訊可以永久保留而不需要刪除"},"tags":["ISO/ISMS"]},{"seq":354,"source_id":354,"answer":"C","question":"ISO/IEC 27001:2022 在附錄 A 中，對於時脈同步有何要求？","options 開金鑰","網路安全"]},{"seq":756,"source_id":356,"answer":"B","question":"在 SSL 簡化的協議方式中，最後的步驟是？","options":{"A":"伺服端傳送 server_hello","B":"伺服端傳送 [change_cipher_spec] 和 finished","C":"客戶端傳送 client_hello","D":"雙方交換鑰匙材料"},"tags":["網路安全"]},{"seq":757,"source_id":357,"answer":"A","question":"SSL 握手協定運作完成後，會進入什麼階段？","options":{"A":"SSL/TLS 安全連線 (Record Protocol)","B":"傳送 client_hello","C":"傳送 server_hello","D":"重新開始握手"},"tags":["網路安全"]},{"seq":758,"source_id":358,"answer":"C","question":"在 SSL 握手協定運作圖中，第三階段包含哪個訊息？","options":{"A":"server_hello","B":"server_done","C":"client_key_exchange","D":"finished"},"tags":["網路安全"]},{"seq":759,"source_id":359,"answer":"B","question":"多功能瀏覽器處理的通訊協定不包含下列何者？","options":{"A":"http","B":"tcp","C":"ftp","D":"https"},"tags":["其他"]},{"seq":760,"source_id":360,"answer":"A","question":"使用於 SSL Record Layer 的參數中，哪一個是用來描述壓縮方法？","options":{"A":"Compression Method","B":"Master Secret","C":"Peer Certificate","D":"Session Identifier"},"tags":["網路安全"]},{"seq":761,"source_id":361,"answer":"B","question":"下列何者是「8-3-2 SSL 協商步驟與結果」中提到的 MAC 演算法協商 項目？","options":{"A":"3DES","B":"MD5","C":"RC4","D":"DES"},"tags":["DES/AES","網路安全"]},{"seq":762,"source_id":362,"answer":"D","question":"下列何者是使用於 SSL Record Layer 的參數，用來描述安全政策？","options":{"A":"IP Address","B":"DNS Record","C":"Port Number","D":"Session Identifier"},"tags":["網路安全"]},{"seq":763,"source_id":363,"answer":"A","question":"在 SSL 握手層訊息格式中，「紀錄協定」的 Type 值是多少？","options":{"A":"23","B":"21","C":"22","D":"20"},"tags":["網路安全"]}];

</script>
<script>
const LETTERS = ['A','B','C','D'];
let quiz = [], idx = 0, selected = {}, lastSettings = null;
const $ = (id) => document.getElementById(id);
function escapeHTML(s){return String(s ?? '').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function renderMathText(s){ return escapeHTML(s); }
function typeset(){ if(window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise().catch(()=>{}); }
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getWrongSeqs(){try{return JSON.parse(localStorage.getItem('zian_wrong_seqs')||'[]')}catch(e){return []}}
function setWrongSeqs(arr){localStorage.setItem('zian_wrong_seqs', JSON.stringify([...new Set(arr)])); updateWrongCount();}
function updateWrongCount(){ $('wrongCount').textContent = getWrongSeqs().length; }
function uniqueByContent(list){const seen=new Set(), out=[]; for(const q of list){const key=JSON.stringify([q.answer,q.question,q.options]); if(!seen.has(key)){seen.add(key);out.push(q);}} return out;}
function initTags(){const tags=[...new Set(QUESTIONS.flatMap(q=>q.tags||[]))].sort(); const sel=$('tagFilter'); for(const t of tags){const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);}}
function poolQuestions(){let bank=$('bankMode').value; let pool=bank==='unique'?uniqueByContent(QUESTIONS):[...QUESTIONS]; if(bank==='wrong'){const wrong=new Set(getWrongSeqs()); pool=QUESTIONS.filter(q=>wrong.has(q.seq));} const tag=$('tagFilter').value; if(tag!=='all') pool=pool.filter(q=>(q.tags||[]).includes(tag)); const s=parseInt($('startNo').value,10), e=parseInt($('endNo').value,10); if(!Number.isNaN(s)) pool=pool.filter(q=>q.source_id>=s); if(!Number.isNaN(e)) pool=pool.filter(q=>q.source_id<=e); return pool;}
function readSettings(){return {bankMode:$('bankMode').value, tagFilter:$('tagFilter').value, count:$('count').value, quizMode:$('quizMode').value, startNo:$('startNo').value, endNo:$('endNo').value};}
function applySettings(s){if(!s)return; for(const [k,v] of Object.entries(s)){if($(k)) $(k).value=v;}}
function startQuiz(){lastSettings=readSettings(); const pool=poolQuestions(); if(pool.length===0){alert('這個條件沒有題目，可以換成「完整 763 題」或清掉範圍限制。');return;} const n=$('count').value==='all'?pool.length:Math.min(parseInt($('count').value,10),pool.length); quiz=shuffle(pool).slice(0,n); idx=0; selected={}; $('setup').hidden=true; $('result').hidden=true; $('quiz').hidden=false; renderQuestion();}
function scoreNow(){let s=0; for(const q of quiz){if(selected[q.seq]===q.answer)s++;} return s;}
function renderQuestion(){const q=quiz[idx], mode=$('quizMode').value, user=selected[q.seq]; $('qIndex').textContent=`第 ${idx+1} / ${quiz.length} 題`; $('bar').style.width=((idx+1)/quiz.length*100)+'%'; $('scoreBadge').textContent=`目前 ${scoreNow()} / ${Object.keys(selected).length}`; $('meta').textContent=`題庫序號 ${q.seq}｜PDF 原題號 ${q.source_id}｜分類：${(q.tags||[]).join('、')}`; $('question').innerHTML=renderMathText(q.question); const box=$('options'); box.innerHTML=''; for(const l of LETTERS){const b=document.createElement('button'); b.className='opt'; b.type='button'; b.innerHTML=`<b>${l}.</b> ${renderMathText(q.options?.[l]||'')}`; if(user){ if(l===q.answer)b.classList.add('correct'); if(l===user&&user!==q.answer)b.classList.add('wrong'); } b.onclick=()=>choose(l); box.appendChild(b);} const fb=$('feedback'); if(user&&mode==='practice'){fb.hidden=false; fb.innerHTML=(user===q.answer?'✅ 答對了！':'❌ 答錯了。')+` 正確答案是 <b>${q.answer}</b>：${renderMathText(q.options[q.answer])}`;}else{fb.hidden=true; fb.innerHTML='';} $('prevBtn').disabled=idx===0; $('nextBtn').textContent=idx===quiz.length-1?'最後一題':'下一題'; typeset();}
function choose(l){const q=quiz[idx]; selected[q.seq]=l; const wrong=getWrongSeqs(); if(l!==q.answer) setWrongSeqs([...wrong,q.seq]); else setWrongSeqs(wrong.filter(x=>x!==q.seq)); renderQuestion();}
function nextQ(){if(idx<quiz.length-1){idx++;renderQuestion();}else showResult();}
function prevQ(){if(idx>0){idx--;renderQuestion();}}
function showResult(){if(!quiz.length)return; $('quiz').hidden=true; $('result').hidden=false; const total=quiz.length, answered=Object.keys(selected).length, score=scoreNow(); $('summary').innerHTML=`你答對 <b>${score}</b> / ${total} 題，正確率 <b>${Math.round(score/total*100)}</b>%。已作答 ${answered} 題。`; const review=$('review'); review.innerHTML=''; for(const [i,q] of quiz.entries()){const user=selected[q.seq]; if(user!==q.answer){const div=document.createElement('div'); div.className='reviewItem'; div.innerHTML=`<b>第 ${i+1} 題｜PDF 原題號 ${q.source_id}</b><br>${renderMathText(q.question)}<br><span class="muted">你的答案：${user||'未作答'}；正確答案：${q.answer} ${renderMathText(q.options[q.answer])}</span>`; review.appendChild(div);}} if(!review.innerHTML) review.innerHTML='<p>太強了，這次沒有錯題！</p>'; typeset();}
function backSetup(){ $('quiz').hidden=true; $('result').hidden=true; $('setup').hidden=false; }
function doSearch(){const kw=$('searchInput').value.trim().toLowerCase(), box=$('searchResult'); box.innerHTML=''; if(!kw){box.innerHTML='<p class="muted">輸入關鍵字後可以快速查題。</p>';return;} const res=QUESTIONS.filter(q=>(q.question+' '+Object.values(q.options||{}).join(' ')+' '+(q.tags||[]).join(' ')).toLowerCase().includes(kw)).slice(0,80); box.innerHTML=`<p class="muted">找到 ${res.length} 筆（最多顯示 80 筆）。</p>`; for(const q of res){const d=document.createElement('details'); d.innerHTML=`<summary>題庫序號 ${q.seq}｜原題號 ${q.source_id}｜${renderMathText(q.question)}</summary><p>A. ${renderMathText(q.options.A)}</p><p>B. ${renderMathText(q.options.B)}</p><p>C. ${renderMathText(q.options.C)}</p><p>D. ${renderMathText(q.options.D)}</p><p><b>答案：${q.answer}</b></p>`; box.appendChild(d);} typeset();}
window.addEventListener('DOMContentLoaded',()=>{if(!window.QUESTIONS){alert('題庫 questions.js 沒有載入，請確認四個檔案都在同一個資料夾。');return;} $('statAll').textContent=QUESTIONS.length; $('statUnique').textContent=uniqueByContent(QUESTIONS).length; updateWrongCount(); initTags(); $('startBtn').addEventListener('click',startQuiz); $('nextBtn').addEventListener('click',nextQ); $('prevBtn').addEventListener('click',prevQ); $('finishBtn').addEventListener('click',showResult); $('backBtn').addEventListener('click',backSetup); $('againBtn').addEventListener('click',()=>{applySettings(lastSettings); startQuiz();}); $('homeBtn').addEventListener('click',backSetup); $('wrongBtn').addEventListener('click',()=>{$('bankMode').value='wrong';startQuiz();}); $('clearWrongBtn').addEventListener('click',()=>{setWrongSeqs([]);alert('錯題本已清空。');}); $('searchBtn').addEventListener('click',doSearch); $('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});});

</script>
</body>
</html>
